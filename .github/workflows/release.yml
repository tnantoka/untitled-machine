name: Release

# Two ways to release (the release is published with its asset only after the
# build/sign/notarize succeed, so there's no empty release):
#   - From the browser: Actions tab → "Run workflow" → enter the version.
#   - From git: push a tag like v1.0.0.
# Never runs on plain merges/pushes.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version, e.g. 1.0.0"
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the GitHub Release

env:
  SCHEME: UntitledMachine
  TEAM_ID: H4Z42X3L6X

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode 26
        run: |
          XC=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then echo "Xcode 26 not found on runner" >&2; exit 1; fi
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: Resolve version
        run: |
          # From the manual input, or from the pushed tag (v1.2.3 -> 1.2.3).
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"   # monotonic build number

      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          # Make our keychain searchable (keep the existing ones too).
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          rm "$RUNNER_TEMP/cert.p12"

      - name: Build (unsigned)
        run: |
          xcodebuild -project UntitledMachine.xcodeproj -scheme "$SCHEME" -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="$VERSION" CURRENT_PROJECT_VERSION="$BUILD" \
            CODE_SIGNING_ALLOWED=NO clean build

      - name: Sign (Developer ID + hardened runtime)
        run: |
          APP="build/Build/Products/Release/$SCHEME.app"
          codesign --force --options runtime --timestamp \
            --sign "Developer ID Application" "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Notarize and staple
        env:
          P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
        run: |
          APP="build/Build/Products/Release/$SCHEME.app"
          echo "$P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" --key-id "$KEY_ID" --issuer "$ISSUER_ID" --wait
          rm "$RUNNER_TEMP/AuthKey.p8"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Package zip
        run: |
          APP="build/Build/Products/Release/$SCHEME.app"
          ditto -c -k --keepParent "$APP" "$SCHEME-$VERSION.zip"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Built-in gh CLI (no Node action → no Node-deprecation churn).
          # Published with the asset already attached (the build ran first), and
          # the tag is created pointing at this commit.
          gh release create "v$VERSION" "$SCHEME-$VERSION.zip" \
            --generate-notes --title "v$VERSION" --target "$GITHUB_SHA"
